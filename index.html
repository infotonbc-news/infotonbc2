      if (window.playablesSDK) return;

      var HANDLER_NAME = 'playablesGameEventHandler';
      var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
      var RAF_FRAME_THRESHOLD = 3;

        return !!(window.parent && window.parent !== window);

          type: eventName,
          payload: payload || {},
          timestamp: Date.now()

        if (isInIframe()) {
          try {
            window.parent.postMessage(message, '*');
          } catch (e) { /* ignore */ }
          return;
        }
      }

      // --- rAF Game-Ready Detection ---

      function onFrame() {
        if (gameReadySent) return;

        frameCount++;
        if (frameCount >= RAF_FRAME_THRESHOLD) {
          gameReadySent = true;
          sendEvent('game_ready', {
            frame_count: frameCount,
            detected_at: Date.now()
          });

        }

        originalRAF.call(window, onFrame);
      }

      if (originalRAF) {
        window.requestAnimationFrame = function(callback) {
          if (!gameReadySent) {
            return originalRAF.call(window, function(timestamp) {

                  detected_at: Date.now()

      function setupFirstInteractionDetection() {

          for (var i = 0; i < events.length; i++) {

            score: score,
            completed: true

          errorSent = true;
          sendEvent('error', {

            auto_captured: false

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>be a Natural Chillaz – WORLDWIDE NEWS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --gold: #d4af37;
        --gold-light: #e8c858;
        --bg: #0b0f0a;
        --bg-2: #0a0a0a;
      }
      html, body { height: 100%; }
      body {
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        background-color: var(--bg);
        color: #fff;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        position: relative;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: 
          radial-gradient(circle at 1px 1px, rgba(212,175,55,0.07) 1px, transparent 0),
          radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0);
        background-size: 26px 26px;
        background-position: 0 0, 13px 13px;
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        content: '';
        position: fixed;
        top: -50%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 60%);
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
      }

      .wrap {
        position: relative;
        z-index: 1;
        max-width: 420px;
        margin: 0 auto;
        padding: 28px 18px 110px;
        min-height: 100vh;
      }

      header {
        text-align: center;
        padding-top: 12px;
      }
      .logo {
        width: 280px;
        max-width: 78vw;
        height: auto;
        display: block;
        margin: 0 auto 18px;
        filter: drop-shadow(0 8px 24px rgba(212,175,55,0.25));
        animation: float 6s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      h1 {
        color: var(--gold);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 32px;
        text-align: center;
        margin: 8px 0 32px;
        text-shadow: 0 2px 20px rgba(212,175,55,0.3), 0 0 40px rgba(212,175,55,0.15);
      }

      .qr-card {
        width: 340px;
        max-width: 92%;
        margin: 0 auto 44px;
        background: #ffffff;
        border-radius: 24px;
        padding: 16px;
        box-shadow: 
          0 30px 60px -20px rgba(0,0,0,0.9),
          0 0 0 1px rgba(212,175,55,0.2),
          inset 0 1px 0 rgba(255,255,255,1),
          0 0 80px rgba(212,175,55,0.08);
        position: relative;
        transform: perspective(1000px) rotateX(0deg);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
      }
      .qr-card:hover {
        transform: perspective(1000px) rotateX(2deg) translateY(-4px);
        box-shadow: 
          0 40px 80px -20px rgba(0,0,0,1),
          0 0 0 1px rgba(212,175,55,0.35),
          inset 0 1px 0 rgba(255,255,255,1),
          0 0 100px rgba(212,175,55,0.15);
      }
      .qr-card::before {
        content: '';
        position: absolute;
        inset: -2px;
        background: linear-gradient(135deg, var(--gold), transparent 40%, transparent 60%, var(--gold-light));
        border-radius: 26px;
        z-index: -1;
        opacity: 0.3;
        filter: blur(12px);
      }
      .qr-card img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 14px;
      }

      .section-title {
        color: var(--gold);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        text-align: center;
        margin: 0 0 18px;
        opacity: 0.9;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .section-title::before,
      .section-title::after {
        content: '';
        height: 1px;
        width: 40px;
        background: linear-gradient(90deg, transparent, var(--gold));
        opacity: 0.5;
      }
      .section-title::after {
        background: linear-gradient(90deg, var(--gold), transparent);
      }

      .news-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .news-card {
        display: block;
        position: relative;
        background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
        border: 1px solid rgba(212,175,55,0.18);
        border-radius: 16px;
        padding: 14px 16px 14px 18px;
        text-decoration: none;
        color: #e8e8e8;
        transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }
      .news-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--gold), var(--gold-light));
        opacity: 0.7;
        transition: width 0.3s ease;
      }
      .news-card:hover {
        transform: translateY(-2px);
        border-color: rgba(212,175,55,0.45);
        background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
        box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 20px rgba(212,175,55,0.1);
      }
      .news-card:hover::before { width: 4px; opacity: 1; }
      .news-source {
        font-size: 10.5px;
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .news-source::before {
        content: '●';
        font-size: 8px;
        opacity: 0.8;
      }
      .news-title {
        font-size: 14.5px;
        line-height: 1.35;
        font-weight: 500;
        color: #fff;
        margin-bottom: 6px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .news-meta {
        font-size: 11px;
        color: rgba(255,255,255,0.45);
        font-weight: 400;
      }

      .loading {
        text-align: center;
        padding: 24px;
        color: rgba(212,175,55,0.7);
        font-size: 13px;
      }
      .loading::after {
        content: '...';
        animation: dots 1.4s infinite;
      }
      @keyframes dots { 0%,20% { content: '.' } 40% { content: '..' } 60%,100% { content: '...' } }

      /* TICKER */
      .ticker {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: rgba(8,11,8,0.92);
        backdrop-filter: blur(16px) saturate(1.2);
        border-top: 1px solid rgba(212,175,55,0.25);
        display: flex;
        align-items: center;
        z-index: 1000;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
      }
      .ticker-label {
        background: linear-gradient(135deg, var(--gold), var(--gold-light));
        color: #0b0f0a;
        font-weight: 800;
        padding: 0 16px;
        height: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
        box-shadow: 4px 0 20px rgba(212,175,55,0.2);
        position: relative;
        z-index: 2;
      }
      .ticker-label::after {
        content: '';
        position: absolute;
        right: -8px;
        top: 0;
        bottom: 0;
        width: 16px;
        background: linear-gradient(135deg, var(--gold), var(--gold-light));
        clip-path: polygon(0 0, 0% 100%, 100% 50%);
      }
      .ticker-label svg { width: 14px; height: 14px; }
      .ticker-track {
        flex: 1;
        overflow: hidden;
        height: 100%;
        position: relative;
        mask-image: linear-gradient(90deg, transparent 0, black 20px, black calc(100% - 20px), transparent);
      }
      .ticker-content {
        display: flex;
        align-items: center;
        gap: 36px;
        height: 100%;
        white-space: nowrap;
        will-change: transform;
        animation: scroll 180s linear infinite;
        padding-left: 24px;
      }
      .ticker-content:hover { animation-play-state: paused; }
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .ticker-item {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: rgba(255,255,255,0.88);
        font-size: 13px;
        font-weight: 400;
        flex-shrink: 0;
      }
      .ticker-item a {
        color: var(--gold);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .ticker-item a:hover { color: var(--gold-light); text-decoration: underline; }
      .ticker-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0.7;
        flex-shrink: 0;
      }

      @media (max-width: 380px) {
        h1 { font-size: 28px; }
        .qr-card { width: 300px; }
        .ticker-label { padding: 0 12px; font-size: 11px; }
      }
    </style>
