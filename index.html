<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NaturalBornChillaz</title>
<style>
:root{--bg:#070807;--card:#141613;--gold:#C9A227;--text:#e8e8e6;--muted:#9a9a8f}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;padding-bottom:80px;background-image:radial-gradient(rgba(201,162,39,.07)1px,transparent 1px);background-size:22px 22px}
.wrap{max-width:1200px;margin:0 auto;padding:0 20px}
header{padding:80px 0 20px;text-align:center}
.logo{font-size:46px;font-weight:800;color:var(--gold)}
h1{text-align:center;color:var(--gold);margin:10px 0}
.sub{text-align:center;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin:30px 0}
.card{display:block;background:var(--card);border:1px solid #333;border-radius:12px;padding:18px;color:inherit;text-decoration:none}
.card:hover{border-color:var(--gold)}
.cat{color:var(--gold);font-size:12px;text-transform:uppercase}
.rent-wrap{display:grid;grid-template-columns:1fr 220px 1fr;gap:20px;align-items:center;margin:50px 0}
.rent-banner{display:block;background:#111;border:2px dashed var(--gold);border-radius:12px;padding:24px;text-align:center;color:inherit;text-decoration:none}
.rent-banner:hover{background:#1a1a1a}
.rent-banner h3{color:var(--gold);margin:0 0 8px}
.qr{text-align:center}.qr img{max-width:200px;border:2px solid var(--gold);border-radius:12px}
.ticker{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:2px solid var(--gold);padding:12px;white-space:nowrap;overflow:hidden}
.ticker div{display:inline-block;animation:slide 60s linear infinite;color:var(--gold)}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
#age{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center}
.ageBox{background:#141613;border:2px solid var(--gold);padding:30px;border-radius:12px;text-align:center}
.ageBox button{background:var(--gold);color:#000;border:0;padding:10px 20px;border-radius:6px;font-weight:bold;margin-top:10px;cursor:pointer}
.lang{position:fixed;top:12px;right:12px;display:flex;gap:6px}
.lang button{width:36px;height:36px;border-radius:50%;background:#111;color:var(--gold);border:1px solid var(--gold);cursor:pointer}
.lang button.active{background:var(--gold);color:#000}
@media(max-width:800px){.rent-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="age">
 <div class="ageBox">
