<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NaturalBornChillaz — Worldwide News</title>
<style>
body{
  margin:0;
  background-color:#050607;
  background-image:radial-gradient(circle at 20% 20%, rgba(201,162,39,0.15), transparent 40%), radial-gradient(circle at 80% 80%, rgba(201,162,39,0.1), transparent 40%);
  color:#eee;
  font-family:Arial, sans-serif;
  padding-bottom:80px;
}
.wrap{max-width:1100px;margin:0 auto;padding:40px 20px}
.logo{font-size:52px;font-weight:bold;color:#C9A227;text-align:center;text-shadow:0 0 20px rgba(201,162,39,0.4)}
.tag{color:#aaa;text-align:center;letter-spacing:3px;font-size:13px;margin-bottom:30px}
h1{color:#C9A227;text-align:center;font-size:36px;margin:20px 0 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-top:30px}
.card{background:#111;border:1px solid #2a2a2a;border-radius:14px;padding:20px;transition:0.2s}
.card:hover{border-color:#C9A227;transform:translateY(-3px)}
.card a{color:#fff;text-decoration:none}
.kicker{color:#C9A227;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.card h3{margin:8px 0 5px;font-size:18px}
.rent{display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin:50px 0;align-items:center}
.ad{background:#111;border:2px dashed #C9A227;border-radius:12px;padding:22px;width:240px;text-align:center;color:#fff;text-decoration:none}
.ad:hover{background:#1a1a1a}
.qr img{width:190px;border:2px solid #C9A227;border-radius:12px}
footer{text-align:center;border-top:1px solid #333;padding:25px;margin-top:50px;color:#888}
footer a{color:#C9A227;margin:0 12px;text-decoration:none;font-weight:bold}
#gate{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:999}
.box{background:#111;border:2px solid #C9A227;padding:35px;border-radius:12px;text-align:center}
button{background:#C9A227;color:#000;border:0;padding:12px 24px;font-weight:bold;cursor:pointer;border-radius:6px;font-size:15px}
.ticker{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #C9A227;padding:9px;color:#C9A227;overflow:hidden}
.ticker div{white-space:nowrap;animation:slide 45s linear infinite}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
</style>
</head>
<body>

<div id="gate"><div class="box"><h2 style="color:#C9A227;margin:0 0 10px">18+</h2><p style="margin:0 0 15px;color:#ccc">Nur für Erwachsene</p><button onclick="document.getElementById('gate').style.display='none';localStorage.nbc18=1">Ich bin 18+</button></div></div>
