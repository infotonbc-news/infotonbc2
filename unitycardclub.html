<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0A0A0F;color:#E5E4E2;overflow:hidden}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.ui-overlay{position:relative;z-index:10;height:100vh;display:grid;grid-template-columns:300px 1fr 350px;gap:20px;padding:20px;pointer-events:none}
.panel{background:rgba(229,228,226,0.03);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,0.2);border-radius:20px;padding:20px;pointer-events:all;overflow-y:auto}
h2{font-family:'Orbitron',sans-serif;font-size:18px;color:#D4AF37;margin-bottom:15px;letter-spacing:2px}
.member-item{padding:12px;background:rgba(10,10,15,0.4);border:1px solid rgba(229,228,226,0.1);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:all 0.3s}
.member-item:hover{background:rgba(212,175,55,0.1);border-color:#D4AF37}
.member-name{font-weight:600;margin-bottom:4px}
.member-title{font-size:11px;color:#00D9FF;letter-spacing:1px}
.badge{display:inline-block;padding:2px 8px;background:linear-gradient(135deg,#D4AF37,#E5E4E2);color:#0A0A0F;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px}

/* UNITYCARD - ANFASSBAR */
.unitycard-popup{
  position:fixed;top:50%;left:50%;
  width:480px;height:300px;
  background:linear-gradient(135deg,#0A0A0F 0%,#1A1A2E 50%,#0A0A0F 100%);
  border-radius:20px;
  box-shadow:0 25px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(212,175,55,0.3),0 0 60px rgba(212,175,55,0.2);
  z-index:1000;display:none;overflow:hidden;
  perspective:1000px;
  cursor:grab;
  transform:translate(-50%,-50%) rotateX(0deg) rotateY(0deg);
  transition:box-shadow 0.3s;
}
.unitycard-popup.active{display:block;animation:cardFlip 0.6s ease-out}
.unitycard-popup.dragging{cursor:grabbing;transition:none}
.unitycard-popup:hover{box-shadow:0 35px 100px rgba(0,0,0,0.9),0 0 0 1px rgba(212,175,55,0.5),0 0 80px rgba(212,175,55,0.4)}
@keyframes cardFlip{from{transform:translate(-50%,-50%) rotateY(90deg) scale(0.8);opacity:0}to{transform:translate(-50%,-50%) rotateY(0deg) scale(1);opacity:1}}

.card-bg-effect{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.card-bg-effect::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(212,175,55,0.15) 1px,transparent 1px);
  background-size:20px 20px;animation:stars 20s linear infinite;
}
@keyframes stars{to{transform:rotate(360deg)}}

.card-holo-stripe{
  position:absolute;top:55%;left:0;width:100%;height:40px;
  background:linear-gradient(90deg,#00D9FF,#D4AF37,#FF00FF,#00D9FF);
  background-size:200% 100%;
  animation:holoMove 3s linear infinite;
  opacity:0.9;mix-blend-mode:screen;
}
@keyframes holoMove{to{background-position:200% 0}}

.card-glow-edge{position:absolute;inset:0;border-radius:20px;box-shadow:inset 0 0 0 2px rgba(212,175,55,0.5),0 0 40px rgba(212,175,55,0.4);pointer-events:none}
.card-content{position:relative;z-index:2;padding:25px;height:100%;display:flex;flex-direction:column;pointer-events:none}

/* INSTAGRAM AVATAR */
.card-insta-avatar{
  position:absolute;top:20px;left:20px;
  width:60px;height:60px;
  border-radius:50%;
  border:2px solid #D4AF37;
  box-shadow:0 0 15px rgba(212,175,55,0.6);
  cursor:pointer;
  pointer-events:all;
  transition:all 0.3s;
  object-fit:cover;
  background:rgba(212,175,55,0.2);
}
.card-insta-avatar:hover{transform:scale(1.1);box-shadow:0 0 25px rgba(212,175,55,0.9)}

.card-leaf{position:absolute;top:25px;left:95px;width:50px;height:50px;opacity:0.6}
.card-leaf svg{width:100%;height:100%;filter:drop-shadow(0 0 10px rgba(212,175,55,0.6))}

.card-title{
  font-family:'Orbitron',sans-serif;font-size:28px;color:#D4AF37;
  text-align:right;margin-top:10px;letter-spacing:3px;
  text-shadow:0 0 20px rgba(212,175,55,0.5);
}

.card-nbc-badge{
  position:absolute;top:20px;right:20px;width:50px;height:50px;
  border:2px solid #D4AF37;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 15px rgba(212,175,55,0.4);
  pointer-events:none;
}
.card-nbc-badge span{font-size:10px;color:#00D9FF;font-weight:700}

.card-neon-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.card-neon-lines::before,.card-neon-lines::after{
  content:'';position:absolute;background:#00D9FF;box-shadow:0 0 10px #00D9FF;opacity:0.3;
}
.card-neon-lines::before{top:40%;left:0;width:100%;height:1px}
.card-neon-lines::after{top:20%;right:15%;width:1px;height:30%}

.card-rank-badge{
  position:absolute;bottom:70px;right:25px;
  padding:8px 16px;
  background:linear-gradient(135deg,#D4AF37,#B8860B);
  border:3px solid #D4AF37;
  border-radius:10px;
  box-shadow:0 0 20px rgba(212,175,55,0.6),inset 0 2px 0 rgba(255,255,255,0.3),inset 0 -2px 0 rgba(0,0,0,0.3);
  z-index:3;
  pointer-events:none;
}
.card-rank-badge::before{
  content:'';position:absolute;inset:-6px;
  border:1px solid #D4AF37;
  border-radius:12px;
  opacity:0.5;
}
.card-rank-text{
  font-family:'Orbitron',sans-serif;
  font-size:11px;font-weight:900;color:#0A0A0F;
  text-transform:uppercase;letter-spacing:1.5px;
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
}
.card-rank-donation{
  font-size:9px;color:#0A0A0F;opacity:0.8;
  text-align:center;margin-top:2px;
}

.card-bottom{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end}
.card-name{
  font-family:'Orbitron',sans-serif;font-size:18px;color:#00D9FF;
  text-transform:uppercase;letter-spacing:2px;
  text-shadow:0 0 15px #00D9FF;
}
.card-number{

  border:2px solid #D4AF37;border-radius:8px;
  font-family:'Orbitron',sans-serif;font-size:14px;color:#0A0A0F;font-weight:700;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.3),0 5px 15px rgba(212,175,55,0.4);
}
.card-close{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);border:1px solid rgba(212,175,55,0.3);color:#D4AF37;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;line-height:1;z-index:3;pointer-events:all}
.card-close:hover{background:rgba(212,175,55,0.2)}

.chat-box{height:200px;background:rgba(10,10,15,0.6);border-radius:10px;padding:15px;overflow-y:auto;margin-bottom:10px}

.chat-msg.user{text-align:right;color:#D4AF37}
.chat-input{display:flex;gap:10px}
.chat-input input{flex:1;padding:10px;background:rgba(10,10,15,0.6);border:1px solid rgba(229,228,226,0.2);border-radius:8px;color:#E5E4E2}
.btn{padding:10px 20px;background:linear-gradient(135deg,#D4AF37,#E5E4E2);color:#0A0A0F;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:1px}

.highscore-title{

const translations = {
  de: {
    "spenden": "Spenden",
    "chat_placeholder": "Schreibe eine Nachricht...",
    "bot_greeting": "Hey, ich bin dein Unity Bot. Frag mich alles zu Cannabis, Club & Party!",
    "spiele_title": "Spiel gegen Den Chillaz Bot",
    "highscore_title": "🏆 FLIPPER HIGHSCORE"
  },
  en: {
    "spenden": "Donate",
    "chat_placeholder": "Type a message...",
    "bot_greeting": "Hey, I'm your Unity Bot. Ask me anything about cannabis, club & party!",
    "spiele_title": "Play vs The Chillaz Bot",
    "highscore_title": "🏆 FLIPPER HIGHSCORE"
  }
};

function detectLang() {
  const userLang = (navigator.language || navigator.userLanguage).slice(0,2);
  return translations[userLang]? userLang : 'de';
}

function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang] && translations[lang][key]) {
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = translations[lang][key];
      } else {
        el.textContent = translations[lang][key];
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const lang = detectLang();
  document.documentElement.lang = lang;
  applyTranslations(lang);
});
</script>

<script type="module">
import * as THREE from 'three';
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
let currentUser=JSON.parse(localStorage.getItem('nbc_current')||'null');
if(!currentUser){alert('Bitte erst einloggen, Chillaz!');location.href='unitycard.html';}

// ===== HIGHSCORE SYSTEM - MUSS GANZ OBEN STEHEN =====
window.addActivityScore = function(points){
    if(!currentUser) return;
    let scores = JSON.parse(localStorage.getItem('nbc_highscores')||'{}');
    scores[currentUser.insta] = (scores[currentUser.insta] || 0) + points;
    localStorage.setItem('nbc_highscores', JSON.stringify(scores));
    updateHighscore();
}

function updateHighscore(){
    let scores = JSON.parse(localStorage.getItem('nbc_highscores')||'{}');
    let sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,10);

    document.getElementById('highscore-list').innerHTML = sorted.length? sorted.map(([insta,pts],i)=>{
        const user = allUsers.find(u=>u.insta===insta);
        const name = user? user.name : insta;
        const isMe = insta === currentUser?.insta? 'me' : '';
        return `<div class="highscore-entry ${isMe}">
            <span class="highscore-name" onclick="showCard('${insta}')">${i+1}. ${name}</span>
            <span class="highscore-points">${pts}</span>
        </div>`;
    }).join('') : '<div style="text-align:center;opacity:0.5;font-size:11px">Noch keine Scores</div>';
}

const demoMembers=[
{name:'Luca Weedmann',insta:'@luca_chill',nation:'DE',donation:120,lat:52.52,lng:13.40},
{name:'Mia Hashfield',insta:'@mia_high',nation:'NL',donation:60,lat:52.37,lng:4.90},
{name:'Diego Kush',insta:'@diego_blaze',nation:'ES',donation:10,lat:40.42,lng:-3.70},
{name:'Jean Chronic',insta:'@jean_puff',nation:'FR',donation:0,lat:48.86,lng:2.35},
{name:'Giovanni Ganja',insta:'@gio_green',nation:'IT',donation:0,lat:41.90,lng:12.50}
];

const allUsers=[...users,...demoMembers.filter(d=>!users.find(u=>u.insta===d.insta))];

function getTitle(amount){
if(amount>=100)return 'Ultimate Chiller';
if(amount>50)return 'Concililiere';
if(amount>=5)return 'Supporter';
return 'Member';
}

function renderLists(){
const topUsers=[...allUsers].filter(u=>u.donation>0).sort((a,b)=>b.donation-a.donation);
document.getElementById('topList').innerHTML=topUsers.length?topUsers.map(u=>`
<div class="member-item" onclick="showCard('${u.insta}')">
<div class="member-name">${u.name} <span class="badge">${getTitle(u.donation)}</span></div>
<div class="member-title">${u.donation}€ gespendet</div>

const card = document.getElementById('cardPopup');
let isDragging = false;
let startX, startY, currentX = 0, currentY = 0;

function handleDragStart(e){
  if(e.target.classList.contains('card-close') || e.target.classList.contains('card-insta-avatar')) return;
  isDragging = true;
  card.classList.add('dragging');
  const point = e.type.includes('mouse')? e : e.touches[0];
  startX = point.clientX;
  startY = point.clientY;
}

function handleDragMove(e){
  if(!isDragging) return;
  e.preventDefault();
  const point = e.type.includes('mouse')? e : e.touches[0];
  const deltaX = point.clientX - startX;
  const deltaY = point.clientY - startY;
  currentX = deltaX;
  currentY = deltaY;
  const rotateY = deltaX * 0.1;
  const rotateX = -deltaY * 0.1;
  card.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px)) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
}

function handleDragEnd(){
  if(!isDragging) return;
  isDragging = false;
  card.classList.remove('dragging');
  card.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
  card.style.transform = 'translate(-50%, -50%) rotateX(0deg) rotateY(0deg)';
  setTimeout(()=>{ card.style.transition = ''; }, 500);
  addActivityScore(1);
}

card.addEventListener('mousedown', handleDragStart);
document.addEventListener('mousemove', handleDragMove);
document.addEventListener('mouseup', handleDragEnd);
card.addEventListener('touchstart', handleDragStart);
document.addEventListener('touchmove', handleDragMove);
document.addEventListener('touchend', handleDragEnd);

// ===== CHILLAZ TV SYSTEM =====
let netzkinoVideos = [];
let currentVideoIndex = 0;
let ytPlayer = null;
const CACHE_KEY = 'chillaz_netzkino_cache';
const CACHE_DURATION = 1000 * 60 * 30;

let ytApiReady = false;
let ytApiPromise = null;

function loadYouTubeAPI() {
  if (ytApiPromise) return ytApiPromise;
  ytApiPromise = new Promise(resolve => {
    if (window.YT && window.YT.Player) {
      ytApiReady = true;
      resolve();
      return;
    }
    window.onYouTubeIframeAPIReady = () => {
      ytApiReady = true;
      resolve();
    };
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  });
  return ytApiPromise;
}

async function loadNetzkinoVideos(forceRefresh = false) {
  if (!forceRefresh) {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) {
      const { timestamp, videos } = JSON.parse(cached);
      if (Date.now() - timestamp < CACHE_DURATION) {
        netzkinoVideos = videos;
        currentVideoIndex = 0;
        return netzkinoVideos;
      }
    }
  }

  try {
    const channelId = 'UC5uJfu-3gUHD1SdbZ1pXyvw';
    const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(rssUrl);

    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (!data.contents) throw new Error('Leere Proxy-Antwort');

    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, 'text/xml');
    const entries = xml.querySelectorAll('entry');

    netzkinoVideos = Array.from(entries)
   .slice(0, 10)
   .map(entry => {
        const videoId = entry.getElementsByTagNameNS('http://www.youtube.com/xml/schemas/2015', 'videoId')[0]?.textContent;
        const title = entry.querySelector('title')?.textContent || 'Ohne Titel';
        return {
          id: videoId,
          title: title,
          thumbnail: `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`
        };
      })
   .filter(v => v.id);

    sessionStorage.setItem(CACHE_KEY, JSON.stringify({
      timestamp: Date.now(),
      videos: netzkinoVideos
    }));

    return netzkinoVideos;

  } catch (e) {
    console.error('Netzkino RSS Fehler:', e);
    netzkinoVideos = [
      {id: 'dQw4w9WgXcQ', title: 'Fallback 1'},
      {id: 'jNQXAC9IVRw', title: 'Fallback 2'}
    ];
    return netzkinoVideos;
  }
}

function getCurrentVideo() {
  return netzkinoVideos[currentVideoIndex] || null;
}

function playNextNetzkinoVideo() {
  if (netzkinoVideos.length === 0) return null;
  currentVideoIndex = (currentVideoIndex + 1) % netzkinoVideos.length;
  return getCurrentVideo();
}

window.openChillazTV = async () => {
  const overlay = document.getElementById('chillazTV');
  overlay.classList.add('active');
  await loadYouTubeAPI();
  await loadNetzkinoVideos();
  const video = getCurrentVideo();
  if (!video) {
    document.getElementById('tvPlayer').innerHTML = '<div style="color:#D4AF37;text-align:center;padding:50px">Keine Videos gefunden 😴</div>';
    return;
  }
  if (ytPlayer) ytPlayer.destroy();
  ytPlayer = new YT.Player('tvPlayer', {
    height: '100%',
    width: '100%',
    videoId: video.id,
    playerVars: {
      autoplay: 1,
      controls: 1,
      modestbranding: 1,
      rel: 0
    },
    events: {
      'onStateChange': onPlayerStateChange
    }
  });
  document.querySelector('.tv-title').textContent = `NETZKINO // ${video.title.slice(0,40)}`;
  addActivityScore(5);
};

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    window.nextVideo();
  }
}

window.nextVideo = () => {
  const video = playNextNetzkinoVideo();
  if (video && ytPlayer) {
    ytPlayer.loadVideoById(video.id);
    document.querySelector('.tv-title').textContent = `NETZKINO // ${video.title.slice(0,40)}`;
    addActivityScore(2);
  }
};

window.closeChillazTV = () => {
  document.getElementById('chillazTV').classList.remove('active');
  if (ytPlayer) {
    ytPlayer.stopVideo();
  }
};

function latLngToVector3(lat,lng,radius){
  const phi = (90-lat)*(Math.PI/180);
  const theta = (lng+180)*(Math.PI/180);
  const x = -(radius * Math.sin(phi) * Math.cos(theta));
  const z = (radius * Math.sin(phi) * Math.sin(theta));
  const y = (radius * Math.cos(phi));
  return new THREE.Vector3(x,y,z);
}

const memberGroup = new THREE.Group();
allUsers.forEach(u=>{
  if(!u.lat ||!u.lng) return;
  const pos = latLngToVector3(u.lat,u.lng,2.08);
  const color = u.donation>=100? 0xD4AF37 : u.donation>=50? 0x00D9FF : u.donation>=5? 0xE5E4E2 : 0x666666;
  const size = u.donation>=100? 0.09 : u.donation>=50? 0.07 : 0.05;
  const point = new THREE.Mesh(
    new THREE.SphereGeometry(size,16,16),
    new THREE.MeshBasicMaterial({color:color})
  );
  point.position.copy(pos);
  point.userData = u;
  memberGroup.add(point);
  if(u.donation >= 50){
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(size*1.5, size*2, 16),
      new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:0.4, side:THREE.DoubleSide})
    );
    ring.position.copy(pos);
    ring.lookAt(0,0,0);
    memberGroup.add(ring);
  }
});
scene.add(memberGroup);

camera.position.z=5;

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredPoint = null;

function onMouseMove(event){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(memberGroup.children);
  if(intersects.length > 0){
    if(hoveredPoint!== intersects[0].object){
      if(hoveredPoint) hoveredPoint.scale.set(1,1,1);
      hoveredPoint = intersects[0].object;
      hoveredPoint.scale.set(1.8,1.8);
      document.body.style.cursor = 'pointer';
    }
  } else {
    if(hoveredPoint) hoveredPoint.scale.set(1,1,1);
    hoveredPoint = null;
    document.body.style.cursor = 'default';
  }
}

function onClick(){
  if(hoveredPoint){
    showCard(hoveredPoint.userData.insta);
    addActivityScore(3);
  }
}

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClick);

function animate(){

  earthGlobe.rotation.y+=0.0005;
  globe.rotation.y+=0.001;
  memberGroup.rotation.y+=0.001;
  atmosphere.rotation.y+=0.0003;
  renderer.render(scene,camera);
}
animate();
