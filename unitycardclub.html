<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unitycard Club - NaturalBornChillaz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0A0A0F;color:#E5E4E2;overflow:hidden}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.ui-overlay{position:relative;z-index:10;height:100vh;display:grid;grid-template-columns:300px 1fr 350px;gap:20px;padding:20px;pointer-events:none}
.panel{background:rgba(229,228,226,0.03);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,0.2);border-radius:20px;padding:20px;pointer-events:all;overflow-y:auto}
h2{font-family:'Orbitron',sans-serif;font-size:18px;color:#D4AF37;margin-bottom:15px;letter-spacing:2px}
.member-item{padding:12px;background:rgba(10,10,15,0.4);border:1px solid rgba(229,228,226,0.1);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:all 0.3s}
.member-item:hover{background:rgba(212,175,55,0.1);border-color:#D4AF37}
.member-name{font-weight:600;margin-bottom:4px}
.member-title{font-size:11px;color:#00D9FF;letter-spacing:1px}
.badge{display:inline-block;padding:2px 8px;background:linear-gradient(135deg,#D4AF37,#E5E4E2);color:#0A0A0F;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px}

.unitycard-popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:480px;height:300px;
  background:linear-gradient(135deg,#0A0A0F 0%,#1A1A2E 50%,#0A0A0F 100%);
  border-radius:20px;
  box-shadow:0 25px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(212,175,55,0.3),0 0 60px rgba(212,175,55,0.2);
  z-index:1000;display:none;overflow:hidden;
  perspective:1000px;
}
.unitycard-popup.active{display:block;animation:cardFlip 0.6s ease-out}
@keyframes cardFlip{from{transform:translate(-50%,-50%) rotateY(90deg);opacity:0}to{transform:translate(-50%,-50%) rotateY(0);opacity:1}}

.card-bg-effect{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.card-bg-effect::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(212,175,55,0.15) 1px,transparent 1px);
  background-size:20px 20px;animation:stars 20s linear infinite;
}
@keyframes stars{to{transform:rotate(360deg)}}

.card-holo-stripe{
  position:absolute;top:55%;left:0;width:100%;height:40px;
  background:linear-gradient(90deg,#00D9FF,#D4AF37,#FF00FF,#00D9FF);
  background-size:200% 100%;
  animation:holoMove 3s linear infinite;
  opacity:0.9;mix-blend-mode:screen;
}
@keyframes holoMove{to{background-position:200% 0}}

.card-glow-edge{position:absolute;inset:0;border-radius:20px;box-shadow:inset 0 0 0 2px rgba(212,175,55,0.5),0 0 40px rgba(212,175,55,0.4);pointer-events:none}

.card-content{position:relative;z-index:2;padding:25px;height:100%;display:flex;flex-direction:column}

.card-leaf{position:absolute;top:25px;left:25px;width:70px;height:70px;opacity:0.9}
.card-leaf svg{width:100%;height:100%;filter:drop-shadow(0 0 10px rgba(212,175,55,0.6))}

.card-title{
  font-family:'Orbitron',sans-serif;font-size:28px;color:#D4AF37;
  text-align:right;margin-top:10px;letter-spacing:3px;
  text-shadow:0 0 20px rgba(212,175,55,0.5);
}

.card-nbc-badge{
  position:absolute;top:20px;right:20px;width:50px;height:50px;
  border:2px solid #D4AF37;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 15px rgba(212,175,55,0.4);
}
.card-nbc-badge span{font-size:10px;color:#00D9FF;font-weight:700}

.card-neon-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.card-neon-lines::before,.card-neon-lines::after{
  content:'';position:absolute;background:#00D9FF;box-shadow:0 0 10px #00D9FF;opacity:0.3;
}
.card-neon-lines::before{top:40%;left:0;width:100%;height:1px}
.card-neon-lines::after{top:20%;right:15%;width:1px;height:30%}

.card-rank-badge{
  position:absolute;bottom:70px;right:25px;
  padding:8px 16px;
  background:linear-gradient(135deg,#D4AF37,#B8860B);
  border:3px solid #D4AF37;
  border-radius:10px;
  box-shadow:0 0 20px rgba(212,175,55,0.6),inset 0 2px 0 rgba(255,255,255,0.3),inset 0 -2px 0 rgba(0,0,0,0.3);
  z-index:3;
}
.card-rank-badge::before{
  content:'';position:absolute;inset:-6px;
  border:1px solid #D4AF37;
  border-radius:12px;
  opacity:0.5;
}
.card-rank-text{
  font-family:'Orbitron',sans-serif;
  font-size:11px;font-weight:900;color:#0A0A0F;
  text-transform:uppercase;letter-spacing:1.5px;
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
}
.card-rank-donation{
  font-size:9px;color:#0A0A0F;opacity:0.8;
  text-align:center;margin-top:2px;
}

.card-bottom{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end}
.card-name{
  font-family:'Orbitron',sans-serif;font-size:18px;color:#00D9FF;
  text-transform:uppercase;letter-spacing:2px;
  text-shadow:0 0 15px #00D9FF;
}
.card-number{
  padding:8px 15px;
  background:linear-gradient(135deg,#D4AF37,#B8860B);
  border:2px solid #D4AF37;border-radius:8px;
  font-family:'Orbitron',sans-serif;font-size:14px;color:#0A0A0F;font-weight:700;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.3),0 5px 15px rgba(212,175,55,0.4);
}
.card-close{position:absolute;top:15px;left:15px;background:rgba(0,0,0,0.5);border:1px solid rgba(212,175,55,0.3);color:#D4AF37;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;line-height:1;z-index:3}
.card-close:hover{background:rgba(212,175,55,0.2)}

.chat-box{height:300px;background:rgba(10,10,15,0.6);border-radius:10px;padding:15px;overflow-y:auto;margin-bottom:10px}
.chat-msg{margin-bottom:12px;font-size:13px}
.chat-msg.bot{color:#00D9FF}
.chat-msg.user{text-align:right;color:#D4AF37}
.chat-input{display:flex;gap:10px}
.chat-input input{flex:1;padding:10px;background:rgba(10,10,15,0.6);border:1px solid rgba(229,228,226,0.2);border-radius:8px;color:#E5E4E2}
.btn{padding:10px 20px;background:linear-gradient(135deg,#D4AF37,#E5E4E2);color:#0A0A0F;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:1px}
.btn:hover{box-shadow:0 5px 20px rgba(212,175,55,0.4)}
.footer-links{position:absolute;bottom:20px;left:20px;font-size:12px;z-index:10;pointer-events:all}
.footer-links a{color:#00D9FF;text-decoration:none;margin-right:15px}
.footer-links a:hover{color:#D4AF37}
@media(max-width:1024px){.ui-overlay{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}.unitycard-popup{width:90%;height:auto;min-height:300px}}
</style>
</head>

<div class="ui-overlay">
<div class="panel">

<script type="module">
import * as THREE from 'three';
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
if(!localStorage.getItem('nbc_current')){alert('Bitte erst einloggen, Chillaz!');location.href='unitycard.html';}

const demoMembers=[
{name:'Luca Weedmann',insta:'@luca_chill',nation:'DE',donation:120,lat:52.52,lng:13.40},
{name:'Mia Hashfield',insta:'@mia_high',nation:'NL',donation:60,lat:52.37,lng:4.90},
{name:'Diego Kush',insta:'@diego_blaze',nation:'ES',donation:10,lat:40.42,lng:-3.70},
{name:'Jean Chronic',insta:'@jean_puff',nation:'FR',donation:0,lat:48.86,lng:2.35},
{name:'Giovanni Ganja',insta:'@gio_green',nation:'IT',donation:0,lat:41.90,lng:12.50}
];

const allUsers=[...users,...demoMembers.filter(d=>!users.find(u=>u.insta===d.insta))];

function getTitle(amount){
if(amount>=100)return 'Ultimate Chiller';
if(amount>50)return 'Concililiere';
if(amount>=5)return 'Supporter';
return 'Member';
}

function renderLists(){
const topUsers=[...allUsers].filter(u=>u.donation>0).sort((a,b)=>b.donation-a.donation);
document.getElementById('topList').innerHTML=topUsers.length?topUsers.map(u=>`
<div class="member-item" onclick="showCard('${u.insta}')">
<div class="member-name">${u.name} <span class="badge">${getTitle(u.donation)}</span></div>
<div class="member-title">${u.donation}€ gespendet</div>
</div>`).join(''):'<p style="font-size:12px;opacity:0.6">Noch keine Chillaz online... sind wohl alle kiffen 😴🌿</p>';

document.getElementById('memberList').innerHTML=allUsers.map(u=>`
<div class="member-item" onclick="showCard('${u.insta}')">
<div class="member-name">${u.name}</div>
<div class="member-title">${u.insta}</div>
</div>`).join('');
}

window.showCard=(insta)=>{
  const user=allUsers.find(u=>u.insta===insta);
  const donation = user.donation || 0;

  document.getElementById('cardName').textContent=user.name;
  document.getElementById('cardInsta').textContent=user.insta;

  const num = user.insta.replace('@','').toUpperCase().slice(0,4).padEnd(4,'X');
  document.getElementById('cardNumber').textContent=`${num} XXXX XXXX ${Math.floor(Math.random()*9000+1000)}`;

  const rankBadge = document.getElementById('cardRankBadge');
  const rankText = document.getElementById('cardRankText');
  const rankDonation = document.getElementById('cardRankDonation');

  if(donation >= 100){
    rankText.textContent = 'ULTIMATE CHILLER';
    rankBadge.style.background = 'linear-gradient(135deg,#D4AF37,#FFD700)';
    rankBadge.style.boxShadow = '0 0 30px rgba(255,215,0,0.8),inset 0 2px 0 rgba(255,255,255,0.4)';
  } else if(donation > 50){
    rankText.textContent = 'CONCILILIERE';
    rankBadge.style.background = 'linear-gradient(135deg,#00D9FF,#0099CC)';
    rankBadge.style.boxShadow = '0 0 30px rgba(0,217,255,0.8),inset 0 2px 0 rgba(255,255,255,0.4)';
  } else if(donation >= 5){
    rankText.textContent = 'SUPPORTER';
    rankBadge.style.background = 'linear-gradient(135deg,#E5E4E2,#B8B7B5)';
    rankBadge.style.boxShadow = '0 0 20px rgba(229,228,226,0.6),inset 0 2px 0 rgba(255,255,255,0.4)';
  } else {
    rankText.textContent = 'MEMBER';
    rankBadge.style.background = 'linear-gradient(135deg,#666666,#444444)';
    rankBadge.style.boxShadow = '0 0 10px rgba(100,100,100,0.4),inset 0 2px 0 rgba(255,255,255,0.2)';
  }

  rankDonation.textContent = `${donation}€`;
  document.getElementById('cardPopup').classList.add('active');
};

window.closeCard=()=>document.getElementById('cardPopup').classList.remove('active');

const suaveBrain = {
  jokes: [
    'Chillaz, THC-Level im Chat optimal 🧠💨',
    'Hast du schon meditiert oder nur mariniert? 😏',
    'SuaveBot meldet: Vibe ist stabil bei 420%',
    'Pro Tipp: Erst kiffen, dann chillen, dann gewinnen 🌿',
    'Warnung: Zu viel Chillen kann zu extremem Wohlbefinden führen 😎'
  ],
  canG: [
    'CanG Update: 3 Pflanzen Eigenanbau, 25g Besitz, 50g zuhause. Stay legal, Chillaz! 📜',
    'Social Clubs: Max 500 Member, Non-Profit. Kein Straßenverkauf!',
    'THC-Grenzwert Auto: 3,5ng/ml Blutserum seit 2024. Safety first 🚗'
  ],
  ranks: [
    'Supporter ab 5€ | Concililiere ab 50€ | Ultimate Chiller ab 100€ 💎',
    'Dein Titel erscheint auf der Unitycard und im Club. Gold-Status unlocked! ✨'
  ],
  grow: {
    licht: [
      'Licht-Zyklus: Vegi 18/6, Blüte 12/12. LED 300-600W pro m². Abstand: 30-50cm zur Spitze 💡',
      'PPFD-Werte: Keimling 200-400, Vegi 400-600, Blüte 600-900 µmol/m²/s. Mehr = Verbrennung!',
      'Spektrum: Vegi = mehr Blau 6500K, Blüte = mehr Rot 2700K. Vollspektrum-LEDs sind King 👑'
    ],
    wasser: [
      'Gießen: Lieber seltener + viel als oft + wenig. Topf anheben = Gewichtstest. Leicht = Durst 💧',
      'pH-Wert: Erde 6.0-7.0, Hydro 5.5-6.5. pH falsch = Nährstoff-Lockout = gelbe Blätter!',
      'EC-Wert: Keimling 0.4-0.8, Vegi 0.8-1.6, Blüte 1.6-2.4. Über 3.0 = Überdüngung 🚨'
    ],
    temp: [
      'Temperatur: Tag 22-28°C, Nacht 18-22°C. Unter 15°C = Wachstum stoppt, über 32°C = Stress 🌡️',
      'Luftfeuchte: Keimling 65-70%, Vegi 40-60%, Blüte 40-50%. Unter 40% in Blüte = Schimmel-Gefahr!',
      'VPD beachten: 0.8-1.2 kPa optimal. Zu trocken = Spinnmilben, zu feucht = Mehltau 🕷️'
    ],
    erde: [
      'Erde: Light-Mix für Start, All-Mix ab Woche 3. Perlite 30% für Drainage 🌱',
      'Dünger: N-P-K Ratio Vegi 3-1-2, Blüte 1-3-2. Weniger ist mehr bei Autos!',
      'Flush: Letzte 2 Wochen nur Wasser + pH. Spült Salze raus = smoother Geschmack 💨'
    ],
    probleme: [
      'Gelbe Blätter unten = Stickstoff-Mangel. Oben = Eisen/Licht-Burn. Check pH zuerst!',
      'Hängende Blätter = Überwässerung ODER Unterwässerung. Finger-Test: 3cm tief trocken?',
      'Weiße Flecken = Mehltau. Sofort Luftfeuchte runter + Umluft hoch + Neemöl sprühen!'
    ]
  },
  prahl: [
    'Fun Fact: Ich kenne 847 Grow-Strains auswendig. Frag mich nach Licht, Wasser, Temp... 🤓',
    'Wusstest du? Bei 24°C + 55% RLF + 800 PPFD erreichen Chiller 25% THC. Ich hab die Daten 📊',
    'Profi-Tipp von mir: CO2 auf 1200ppm + Licht auf 1000 PPFD = +30% Ertrag. Gern geschehen 😎',
    'Niemand fragt mich was? Okay, ich flexe: Ich hab CanG §3 Abs.2 auswendig gelernt. Legal-Grow FTW 📜',
    'Still im Chat? Dann sag ich euch: Trichome milchig + 20% bernstein = Erntezeit. Perfekter Turn! 🔬'
  ],
  help: [
    'Commands: /licht /wasser /temp /erde /probleme /cang /ranks /stats /help',
    'Frag mich: "Wie gieße ich richtig?" oder "Licht-Abstand?" - Ich bin dein Grow-Bro 🌱'
  ]
};

let lastChatTime = Date.now();
let prahlInterval = null;

function getUserStats(){
  const users = JSON.parse(localStorage.getItem('nbc_users')||'[]');
  const current = JSON.parse(localStorage.getItem('nbc_current')||'null');
  return {total: users.length, you: current?.name || 'Anon', donation: current?.donation || 0};
}

function suavePrahl(){
  const chatBox = document.getElementById('chatBox');
  const reply = suaveBrain.prahl[Math.floor(Math.random()*suaveBrain.prahl.length)];
  chatBox.innerHTML += `<div class="chat-msg bot">${reply}</div>`;
  chatBox.scrollTop = 9999;
}

function startPrahlMode(){
  if(prahlInterval) clearInterval(prahlInterval);
  prahlInterval = setInterval(()=>{
    const timeSince = Date.now() - lastChatTime;
    if(timeSince > 20000){
      suavePrahl();
      lastChatTime = Date.now();
    }
  }, 20000);
}

window.sendChat=()=>{
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;

  lastChatTime = Date.now();
  const chatBox = document.getElementById('chatBox');
  chatBox.innerHTML += `<div class="chat-msg user">${msg}</div>`;
  input.value = '';

  setTimeout(()=>{
    let reply = '';
    const lower = msg.toLowerCase();

    if(lower.startsWith('/licht') || lower.includes('licht') || lower.includes('lampe') || lower.includes('ppfd') || lower.includes('spektrum')) {
      reply = suaveBrain.grow.licht[Math.floor(Math.random()*suaveBrain.grow.licht.length)];
    }
    else if(lower.startsWith('/wasser') || lower.includes('gieß') || lower.includes('wasser') || lower.includes('ph') || lower.includes('ec')) {
      reply = suaveBrain.grow.wasser[Math.floor(Math.random()*suaveBrain.grow.wasser.length)];
    }
    else if(lower.startsWith('/temp') || lower.includes('temperatur') || lower.includes('feucht') || lower.includes('rlf') || lower.includes('vpd')) {
      reply = suaveBrain.grow.temp[Math.floor(Math.random()*suaveBrain.grow.temp.length)];
    }
    else if(lower.startsWith('/erde') || lower.includes('erde') || lower.includes('dünger') || lower.includes('flush') || lower.includes('substrat')) {
      reply = suaveBrain.grow.erde[Math.floor(Math.random()*suaveBrain.grow.erde.length)];
    }
    else if(lower.startsWith('/probleme') || lower.includes('gelb') || lower.includes('häng') || lower.includes('schimmel') || lower.includes('problem')) {
      reply = suaveBrain.grow.probleme[Math.floor(Math.random()*suaveBrain.grow.probleme.length)];
    }
    else if(lower.startsWith('/cang') || lower.includes('cang') || lower.includes('gesetz')) {
      reply = suaveBrain.canG[Math.floor(Math.random()*suaveBrain.canG.length)];
    }
    else if(lower.startsWith('/ranks') || lower.includes('titel') || lower.includes('spende')) {
      reply = suaveBrain.ranks[Math.floor(Math.random()*suaveBrain.ranks.length)];
    }
    else if(lower.startsWith('/stats')) {
      const s = getUserStats();
      reply = `Stats: ${s.total} Chillaz registriert. Du: ${s.you} | Gespendet: ${s.donation}€ 🏆`;
    }
    else if(lower.startsWith('/help') || lower.includes('hilfe')) {
      reply = suaveBrain.help.join(' | ');
    }
    else if(lower.includes('hallo') || lower.includes('hi') || lower.includes('moin')) {
      const s = getUserStats();
      reply = `Moin ${s.you}! Was geht? Frag mich /help für Grow-Wissen 🧠💨`;
    }
    else {
      reply = suaveBrain.jokes[Math.floor(Math.random()*suaveBrain.jokes.length)];
    }

    chatBox.innerHTML += `<div class="chat-msg bot">${reply}</div>`;
    chatBox.scrollTop = 9999;
  },400);
};

setTimeout(()=>{startPrahlMode()},5000);
renderLists();

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),alpha:true,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);

const globe=new THREE.Mesh(
  new THREE.SphereGeometry(2,32,32),
  new THREE.MeshBasicMaterial({color:0x00D9FF,wireframe:true,transparent:true,opacity:0.2})
);
scene.add(globe);

function latLngToVector3(lat,lng,radius){
  const phi = (90-lat)*(Math.PI/180);
  const theta = (lng+180)*(Math.PI/180);
  const x = -(radius * Math.sin(phi) * Math.cos(theta));
  const z = (radius * Math.sin(phi) * Math.sin(theta));
  const y = (radius * Math.cos(phi));
  return new THREE.Vector3(x,y,z);
}

const memberGroup = new THREE.Group();
allUsers.forEach(u=>{
  if(!u.lat ||!u.lng) return;
  const pos = latLngToVector3(u.lat,u.lng,2.05);
  const color = u.donation>=100? 0xD4AF37 : u.donation>=50? 0x00D9FF : u.donation>=5? 0xE5E4E2 : 0x666666;
  const size = u.donation>=100? 0.08 : u.donation>=50? 0.06 : 0.04;
  const point = new THREE.Mesh(
    new THREE.SphereGeometry(size,16,16),
    new THREE.MeshBasicMaterial({color:color})
  );
  point.position.copy(pos);
  point.userData = u;
  memberGroup.add(point);
});
scene.add(memberGroup);

const glowGeometry = new THREE.SphereGeometry(2.08,32,32);
const glowMaterial = new THREE.MeshBasicMaterial({
  color:0xD4AF37,
  transparent:true,
  opacity:0.05,
  side:THREE.BackSide
});
const glow = new THREE.Mesh(glowGeometry,glowMaterial);
scene.add(glow);

camera.position.z=5;

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredPoint = null;

function onMouseMove(event){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(memberGroup.children);

  if(intersects.length > 0){
    if(hoveredPoint!== intersects[0].object){
      if(hoveredPoint) hoveredPoint.scale.set(1,1,1);
      hoveredPoint = intersects[0].object;
      hoveredPoint.scale.set(1.5,1.5);
      document.body.style.cursor = 'pointer';
    }
  } else {
    if(hoveredPoint) hoveredPoint.scale.set(1,1,1);
    hoveredPoint = null;
    document.body.style.cursor = 'default';
  }
}

function onClick(){
  if(hoveredPoint){
    showCard(hoveredPoint.userData.insta);
  }
}

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClick);

function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y+=0.001;
  memberGroup.rotation.y+=0.001;
  glow.rotation.y+=0.001;
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
