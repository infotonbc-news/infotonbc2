<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">NaturalBornChillaz | NBC News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Marcellus&display=swap" rel="stylesheet">
<style>
  :root {
    --wood-dark: #0C0A09;
    --jungle: #0B2A1F;
    --glass: rgba(12, 25, 20, 0.42);
    --sage: #9DB4A6;
    --glow-green: #C4F5E0;
    --neon-purple: #C77DFF;
    --gold: #D4AF37;
    --smoke: #F8FAF9;
  }

    * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--wood-dark);
    color: var(--smoke);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      linear-gradient(90deg, rgba(20,14,12,0.85) 0%, transparent 50%, rgba(20,14,12,0.85) 100%),
      repeating-linear-gradient(90deg, #0C0A09, #0C0A09 2px, #1A1411 2px, #1A1411 4px),
      radial-gradient(ellipse at 30% 20%, rgba(196,245,224,0.04) 0%, transparent 50%);
    background-attachment: fixed;
    font-size: 16px;
  }

  #smoke-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1; opacity: 0.65;
  }

 .wrap {
    position: relative;
    z-index: 2;
    max-width: 540px;
    margin: 0 auto;
    padding: 50px 18px 80px;
    width: 100%;
  }

 .glass-plate {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border-radius: 26px;
    position: relative;
    box-shadow: 0 35px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
  }

 .glass-plate::before {
    content: ''; position: absolute; inset: 0; border-radius: 26px; padding: 1.2px;
    background: linear-gradient(135deg, var(--neon-purple), var(--gold), var(--glow-green));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }

  /* --- Responsive --- */
  @media (max-width: 768px) {
   .wrap { padding: 30px 14px 60px; }
   .glass-plate { border-radius: 18px; }
  }
  @media (max-width: 480px) {
    body { font-size: 15px; }
   .wrap { padding: 20px 12px 50px; }
  }

  /* --- Language Switcher --- */
 .lang-switch {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 999;
    display: flex;
    gap: 6px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 6px;
    border-radius: 12px;
  }
 .lang-switch button {
    background: transparent;
    border: 1px solid var(--sage);
    color: var(--smoke);
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    transition: all.2s;
  }
 .lang-switch button:hover,
 .lang-switch button.active {
    background: var(--glow-green);
    color: var(--wood-dark);
    border-color: var(--glow-green);
  }
</style>
</head>
<body>

<div class="lang-switch">
  <button onclick="switchLang('de')">DE</button>
  <button onclick="switchLang('en')">EN</button>
  <button onclick="switchLang('fr')">FR</button>
  <button onclick="switchLang('es')">ES</button>
  <button onclick="switchLang('bg')">BG</button>
  <button onclick="switchLang('pl')">PL</button>
  <button onclick="switchLang('ja')">JA</button>
</div>

<canvas id="smoke-canvas"></canvas>

<div class="wrap">
  <div class="glass-plate">
    <!-- Beispiel: Nutze data-i18n für alle Texte die übersetzt werden sollen -->
    <h1 data-i18n="title" style="text-align:center;padding:40px 20px 20px;">NaturalBornChillaz | NBC News</h1>
    <p data-i18n="subtitle" style="text-align:center;padding:0 20px 30px;color:var(--sage);">Dschungel-Vibes & Chill</p>

    <div style="display:flex;justify-content:center;gap:12px;padding-bottom:40px;flex-wrap:wrap;">
      <button data-i18n="shop">Shop</button>
      <button data-i18n="news">News</button>
      <button data-i18n="contact">Kontakt</button>
      <button data-i18n="follow">Folgen</button>
    </div>
  </div>
</div>

<script>
  // --- 1. Übersetzungen ---
  const translations = {
    de: {
      title: "NaturalBornChillaz | NBC News",
      subtitle: "Dschungel-Vibes & Chill",
      shop: "Shop",
      news: "News",
      contact: "Kontakt",
      follow: "Folgen"
    },
    en: {
      title: "NaturalBornChillaz | NBC News",
      subtitle: "Jungle Vibes & Chill",
      shop: "Shop",
      news: "News",
      contact: "Contact",
      follow: "Follow"
    },
    fr: {
      title: "NaturalBornChillaz | NBC News",
      subtitle: "Vibes Jungle & Chill",
      shop: "Boutique",
      news: "Actualités",
      contact: "Contact",
      follow: "Suivre"
    },
    es: {
      title: "NaturalBornChillaz | NBC News",
      subtitle: "Vibras de Selva y Chill",
      shop: "Tienda",
      news: "Noticias",
      contact: "Contacto",
      follow: "Seguir"
    },
    bg: {
      title: "NaturalBornChillaz | NBC News",
      subtitle: "Джунгла Вайбс & Чил",
      shop: "Магазин",
      news: "Новини",
      contact: "Контакт",
      follow: "Следвай"
    },
    pl: {
      title: "NaturalBornChillaz | NBC News",
      subtitle: "Dżungla Vibes & Chill",
      shop: "Sklep",
      news: "Aktualności",
      contact: "Kontakt",
      follow: "Obserwuj"
    },
    ja: {
      title: "NaturalBornChillaz | NBC News",
      subtitle: "ジャングルバイブス＆チル",
      shop: "ショップ",
      news: "ニュース",
      contact: "お問い合わせ",
      follow: "フォロー"
    }
  };

  // --- 2. Ländercodes zu Sprachen mappen für Geo-IP ---
  const countryToLang = {
    DE: 'de', AT: 'de', CH: 'de',
    US: 'en', GB: 'en', CA: 'en', AU: 'en',
    FR: 'fr', BE: 'fr',
    ES: 'es', MX: 'es', AR: 'es',
    BG: 'bg',
    PL: 'pl',
    JP: 'ja'
  };

  const supported = ['de','en','fr','es','bg','pl','ja'];
  let currentLang = 'en';

  // --- 3. Sprache setzen + UI updaten ---
  function setLanguage(lang) {
    const dict = translations[lang] || translations['en'];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key]) el.textContent = dict[key];
    });
    document.documentElement.lang = lang;
    currentLang = lang;

    // Aktiven Button markieren
    document.querySelectorAll('.lang-switch button').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
    });
  }
  window.switchLang = setLanguage;

  // --- 4. Geo-IP Erkennung + Fallbacks ---
  async function detectLanguage() {
    // Priorität 1: Geo-IP über ipapi.co - kostenlos, kein Key nötig
    try {
      const res = await fetch('https://ipapi.co/json/');
      const data = await res.json();
      const countryLang = countryToLang[data.country_code];
      if (countryLang && supported.includes(countryLang)) {
        setLanguage(countryLang);
        return;
      }
    } catch(e) {
      console.log('Geo-IP failed, using browser language');
    }

    // Priorität 2: Browser-Sprache
    const browserLang = (navigator.language || navigator.userLanguage).slice(0,2).toLowerCase();
    if (supported.includes(browserLang)) {
      setLanguage(browserLang);
      return;
    }

    // Priorität 3: Fallback Englisch
    setLanguage('en');
  }

  detectLanguage();
</script>

</body>
</html>
