<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaturalBornChillaz Unitycard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0A0A0F;color:#E5E4E2;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(0,217,255,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,175,55,0.06) 0%,transparent 50%),url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.03"/></svg>');pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:40px 20px}
header{text-align:center;margin-bottom:60px}
h1{font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#E5E4E2 0%,#D4AF37 50%,#E5E4E2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:0 0 40px rgba(212,175,55,0.3);margin-bottom:10px}
.subtitle{font-size:18px;color:#00D9FF;letter-spacing:4px;font-weight:300}
.glass-panel{background:rgba(229,228,226,0.03);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,0.2);border-radius:20px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1);margin-bottom:30px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:30px}
.form-group{display:flex;flex-direction:column}
label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#D4AF37;margin-bottom:8px;font-weight:600}
input,select{padding:14px 18px;background:rgba(10,10,15,0.6);border:1px solid rgba(229,228,226,0.2);border-radius:10px;color:#E5E4E2;font-size:15px;transition:all 0.3s}
input:focus,select:focus{outline:none;border-color:#D4AF37;box-shadow:0 0 20px rgba(212,175,55,0.2)}
.btn{padding:16px 40px;background:linear-gradient(135deg,#D4AF37 0%,#E5E4E2 100%);color:#0A0A0F;border:none;border-radius:12px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all 0.3s;text-transform:uppercase}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(212,175,55,0.4)}
.btn-secondary{background:transparent;border:1px solid #00D9FF;color:#00D9FF}
.btn-secondary:hover{background:rgba(0,217,255,0.1)}
.tabs{display:flex;gap:20px;margin-bottom:30px;border-bottom:1px solid rgba(212,175,55,0.2)}
.tab{padding:12px 24px;background:transparent;border:none;color:#E5E4E2;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all 0.3s;border-bottom:2px solid transparent}
.tab.active{color:#D4AF37;border-bottom-color:#D4AF37}
footer{text-align:center;margin-top:80px;padding-top:40px;border-top:1px solid rgba(212,175,55,0.2);font-size:13px;color:rgba(229,228,226,0.6)}
footer a{color:#00D9FF;text-decoration:none;margin:0 15px}
footer a:hover{color:#D4AF37}
.we-are-chillaz{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Orbitron',sans-serif;font-size:80px;font-weight:900;color:#D4AF37;text-shadow:0 0 60px rgba(212,175,55,0.8);z-index:9999;pointer-events:none;opacity:0}
.we-are-chillaz.active{animation:popup 2s ease-out forwards}
@keyframes popup{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.admin-panel{display:none}
@media(max-width:768px){h1{font-size:40px;letter-spacing:4px}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>WE ARE CHILLAZ</h1>
<p class="subtitle">Your Access to the Neo-Jungle</p>
</header>

<div class="glass-panel">
<div class="tabs">
<button class="tab active" onclick="showTab('register')">Registrieren</button>
<button class="tab" onclick="showTab('login')">Login</button>
</div>

<div id="registerTab">
<form id="registerForm">
<div class="form-grid">
<div class="form-group"><label>Name</label><input type="text" id="regName" required></div>
<div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
<div class="form-group"><label>Passwort</label><input type="password" id="regPass" required></div>
<div class="form-group"><label>Instagram</label><input type="text" id="regInsta" placeholder="@handle" required></div>
<div class="form-group"><label>Nation</label><select id="regNation" required>
<option value="">Wählen...</option><option value="DE">🇩🇪 Deutschland</option><option value="AT">🇦🇹 Österreich</option><option value="CH">🇨🇭 Schweiz</option><option value="NL">🇳🇱 Niederlande</option><option value="ES">🇪🇸 Spanien</option></select></div>
</div>
<button type="submit" class="btn">Unitycard erstellen</button>
</form>
</div>

<div id="loginTab" style="display:none">
<form id="loginForm">
<div class="form-grid">
<div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
<div class="form-group"><label>Passwort</label><input type="password" id="loginPass" required></div>
</div>
<button type="submit" class="btn">Login</button>
<button type="button" class="btn btn-secondary" onclick="instaLogin()">Login mit Instagram</button>
</form>
</div>
</div>

<div class="glass-panel admin-panel" id="adminPanel">
<h2 style="font-family:'Orbitron';color:#D4AF37;margin-bottom:20px">Admin: Spenden verwalten</h2>
<div class="form-grid">
<div class="form-group"><label>Chillaz auswählen</label><select id="adminUser"></select></div>
<div class="form-group"><label>Spendenbetrag €</label><input type="number" id="adminAmount" min="1"></div>
</div>
<button class="btn" onclick="saveDonation()">Spende eintragen</button>
</div>

<footer>
<p>Die NaturalBornChillaz Unitycard ist ein privates Kunst- und Spaßprojekt. Spenden freiwillig, ohne Gegenleistung.</p>
<div style="margin-top:15px">
<a href="impressumUnity.html">Impressum</a>
<a href="datenschutzUnity.html">Datenschutz</a>
<a href="#" onclick="showAdmin();return false">Admin</a>
</div>
</footer>
</div>

<div class="we-are-chillaz" id="popup">WE ARE CHILLAZ</div>

<script>
const isAdmin = new URLSearchParams(location.search).get('admin') === 'true';
if(isAdmin){document.getElementById('adminPanel').style.display='block';loadAdminUsers();}

function showTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById('registerTab').style.display='none';
document.getElementById('loginTab').style.display='none';
if(tab==='register'){document.querySelectorAll('.tab')[0].classList.add('active');document.getElementById('registerTab').style.display='block';}
else{document.querySelectorAll('.tab')[1].classList.add('active');document.getElementById('loginTab').style.display='block';}
}

document.getElementById('registerForm').onsubmit=(e)=>{
e.preventDefault();
const user={name:regName.value,email:regEmail.value,pass:regPass.value,insta:regInsta.value,nation:regNation.value,donation:0};
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
users.push(user);
localStorage.setItem('nbc_users',JSON.stringify(users));
localStorage.setItem('nbc_current',JSON.stringify(user));
window.location.href='mailto:infotonbc@gmail.com?subject=Unitycard Member&body='+encodeURIComponent(JSON.stringify(user));
document.getElementById('popup').classList.add('active');
setTimeout(()=>location.href='unitycardclub.html',2000);
};

document.getElementById('loginForm').onsubmit=(e)=>{
e.preventDefault();
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
let user=users.find(u=>u.email===loginEmail.value&&u.pass===loginPass.value);
if(user){localStorage.setItem('nbc_current',JSON.stringify(user));location.href='unitycardclub.html';}
else alert('Chillaz, falsche Daten. Hast du schon dein Gehirn gegossen? 🧠💨');
};

function instaLogin(){
let handle=prompt('Instagram Handle:');
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
let user=users.find(u=>u.insta===handle);
if(user){localStorage.setItem('nbc_current',JSON.stringify(user));location.href='unitycardclub.html';}
else alert('Noch nicht registriert, Chillaz!');
}

function showAdmin(){
let pw=prompt('Admin Passwort:');
if(pw==='nbc420'){document.getElementById('adminPanel').style.display='block';loadAdminUsers();}
}

function loadAdminUsers(){
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
adminUser.innerHTML=users.map(u=>`<option value="${u.email}">${u.name} - ${u.donation||0}€</option>`).join('');
}

function saveDonation(){
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
let user=users.find(u=>u.email===adminUser.value);
user.donation=(user.donation||0)+parseInt(adminAmount.value);
localStorage.setItem('nbc_users',JSON.stringify(users));
alert('Spende eingetragen! Titel wird vergeben 🌱');
loadAdminUsers();
}
</script>
</body>
</html>
