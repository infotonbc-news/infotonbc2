<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0A0A0F;color:#E5E4E2;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(0,217,255,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,175,55,0.06) 0%,transparent 50%),url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.03"/></svg>');pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:40px 20px}
header{text-align:center;margin-bottom:60px}
h1{font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#E5E4E2 0%,#D4AF37 50%,#E5E4E2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:0 0 40px rgba(212,175,55,0.3);margin-bottom:10px}
.subtitle{font-size:18px;color:#00D9FF;letter-spacing:4px;font-weight:300}
.glass-panel{background:rgba(229,228,226,0.03);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,0.2);border-radius:20px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1);margin-bottom:30px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:30px}
.form-group{display:flex;flex-direction:column}
label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#D4AF37;margin-bottom:8px;font-weight:600}
input,select,textarea{padding:14px 18px;background:rgba(10,10,15,0.6);border:1px solid rgba(229,228,226,0.2);border-radius:10px;color:#E5E4E2;font-size:15px;transition:all 0.3s;font-family:'Inter',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:#D4AF37;box-shadow:0 0 20px rgba(212,175,55,0.2)}
.btn{padding:16px 40px;background:linear-gradient(135deg,#D4AF37 0%,#E5E4E2 100%);color:#0A0A0F;border:none;border-radius:12px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all 0.3s;text-transform:uppercase}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(212,175,55,0.4)}
.btn-secondary{background:transparent;border:1px solid #00D9FF;color:#00D9FF}
.btn-secondary:hover{background:rgba(0,217,255,0.1)}
.tabs{display:flex;gap:20px;margin-bottom:30px;border-bottom:1px solid rgba(212,175,55,0.2)}
.tab{padding:12px 24px;background:transparent;border:none;color:#E5E4E2;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all 0.3s;border-bottom:2px solid transparent}
.tab.active{color:#D4AF37;border-bottom-color:#D4AF37}
footer{text-align:center;margin-top:80px;padding-top:40px;border-top:1px solid rgba(212,175,55,0.2);font-size:13px;color:rgba(229,228,226,0.6)}
footer a{color:#00D9FF;text-decoration:none;margin:0 15px}
footer a:hover{color:#D4AF37}
.we-are-chillaz{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Orbitron',sans-serif;font-size:80px;font-weight:900;color:#D4AF37;text-shadow:0 0 60px rgba(212,175,55,0.8);z-index:9999;pointer-events:none;opacity:0}
.we-are-chillaz.active{animation:popup 2s ease-out forwards}
@keyframes popup{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.admin-panel{display:none}
#memberTable{width:100%;margin-top:20px;border-collapse:collapse;font-size:13px}
#memberTable th{background:rgba(212,175,55,0.1);padding:12px;text-align:left;color:#D4AF37;font-weight:600;letter-spacing:1px}

#memberTable tr:hover{background:rgba(212,175,55,0.05)}

.modal-overlay.active{display:flex}
.modal-box{width:90%;max-width:450px;background:rgba(229,228,226,0.03);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:35px;box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);animation:modalIn 0.3s ease-out}
@keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box h2{font-family:'Orbitron';color:#D4AF37;margin-bottom:20px;font-size:24px;letter-spacing:2px}
.modal-error{color:#ff4757;font-size:13px;margin-top:8px;height:18px}
@media(max-width:768px){h1{font-size:40px;letter-spacing:4px}.form-grid{grid-template-columns:1fr}}

</head>
<body>

<!-- UHRZEIT + DATUM -->
<div id="datetime" style="position:fixed;top:20px;left:20px;z-index:100;font-family:'Orbitron',sans-serif;color:#D4AF37;text-shadow:0 0 15px rgba(212,175,55,0.6);pointer-events:none">
  <div id="time" style="font-size:24px;font-weight:700;letter-spacing:2px"></div>
  <div id="date" style="font-size:12px;opacity:0.8;margin-top:2px"></div>
</div>

<!-- LANGUAGE SWITCHER -->
<div id="langSwitcher" style="position:fixed;top:20px;right:20px;z-index:100">
  <div id="langCurrent" onclick="toggleLangMenu()" style="width:45px;height:30px;border:2px solid #D4AF37;border-radius:6px;cursor:pointer;box-shadow:0 0 15px rgba(212,175,55,0.4);overflow:hidden;background-size:cover;background-position:center"></div>
  <div id="langMenu" style="display:none;position:absolute;top:38px;right:0;background:rgba(10,10,15,0.95);border:1px solid rgba(212,175,55,0.3);border-radius:10px;padding:8px;backdrop-filter:blur(20px)">
    <div class="lang-option" data-lang="de" style="width:40px;height:25px;margin:4px;cursor:pointer;border-radius:4px;background:url('https://flagcdn.com/w40/de.png') center/cover;border:1px solid rgba(229,228,226,0.2)" onclick="setLang('de')" title="Deutsch"></div>
    <div class="lang-option" data-lang="nl" style="width:40px;height:25px;margin:4px;cursor:pointer;border-radius:4px;background:url('https://flagcdn.com/w40/nl.png') center/cover;border:1px solid rgba(229,228,226,0.2)" onclick="setLang('nl')" title="Nederlands"></div>
    <div class="lang-option" data-lang="en" style="width:40px;height:25px;margin:4px;cursor:pointer;border-radius:4px;background:url('https://flagcdn.com/w40/gb.png') center/cover;border:1px solid rgba(229,228,226,0.2)" onclick="setLang('en')" title="English"></div>
    <div class="lang-option" data-lang="fr" style="width:40px;height:25px;margin:4px;cursor:pointer;border-radius:4px;background:url('https://flagcdn.com/w40/fr.png') center/cover;border:1px solid rgba(229,228,226,0.2)" onclick="setLang('fr')" title="Français"></div>
    <div class="lang-option" data-lang="es" style="width:40px;height:25px;margin:4px;cursor:pointer;border-radius:4px;background:url('https://flagcdn.com/w40/es.png') center/cover;border:1px solid rgba(229,228,226,0.2)" onclick="setLang('es')" title="Español"></div>
    <div class="lang-option" data-lang="bg" style="width:40px;height:25px;margin:4px;cursor:pointer;border-radius:4px;background:url('https://flagcdn.com/w40/bg.png') center/cover;border:1px solid rgba(229,228,226,0.2)" onclick="setLang('bg')" title="Български"></div>

<div class="container">
<header>

<p class="subtitle" data-i18n="subtitle">Your Access to the Neo-Jungle</p>
</header>

<div class="glass-panel">
<div class="tabs">

<button class="tab" onclick="showTab('login')" data-i18n="tab_login">Login</button>

<div id="registerTab">

<div class="form-grid">
<div class="form-group"><label data-i18n="label_name">Name</label><input type="text" id="regName" required></div>

<option value="" data-i18n="select_choose">Wählen...</option><option value="DE">🇩🇪 Deutschland</option><option value="AT">🇦🇹 Österreich</option><option value="CH">🇨🇭 Schweiz</option><option value="NL">🇳🇱 Niederlande</option><option value="ES">🇪🇸 Spanien</option></select></div>
</div>
<button type="submit" class="btn" data-i18n="btn_create">Unitycard erstellen</button>
</form>
</div>

<div id="loginTab" style="display:none">
<form id="loginForm">
<div class="form-grid">
<div class="form-group"><label data-i18n="label_email">Email</label><input type="email" id="loginEmail" required></div>
<div class="form-group"><label data-i18n="label_pass">Passwort</label><input type="password" id="loginPass" required></div>
</div>
<button type="submit" class="btn" data-i18n="btn_login">Login</button>
<button type="button" class="btn btn-secondary" onclick="instaLogin()" data-i18n="btn_insta">Login mit Instagram</button>
</form>
</div>
</div>

<div class="glass-panel admin-panel" id="adminPanel">
<h2 style="font-family:'Orbitron';color:#D4AF37;margin-bottom:20px" data-i18n="admin_title">Admin: Member Kartei</h2>
<div style="margin-bottom:20px">
<input type="text" id="memberSearch" data-i18n-placeholder="search_placeholder" placeholder="Suche Name/Insta..." style="width:100%;padding:12px" onkeyup="filterMembers()">
</div>
<table id="memberTable">
<thead>
<tr><th><input type="checkbox" id="selectAll" onchange="toggleAll(this)"></th><th data-i18n="th_name">Name</th><th data-i18n="th_insta">Instagram</th><th data-i18n="th_email">Email</th><th data-i18n="th_donation">Spende</th></tr>
</thead>
<tbody id="memberTableBody"></tbody>
</table>
<div style="display:flex;gap:15px;margin-top:20px">
<button class="btn" onclick="openMailPopup()" data-i18n="btn_email">Email an Markierte</button>
<div class="form-group" style="margin:0"><label data-i18n="label_amount">Spendenbetrag €</label><input type="number" id="adminAmount" min="1" style="width:150px"></div>
<button class="btn btn-secondary" onclick="saveDonation()" data-i18n="btn_save">Spende eintragen</button>
</div>
</div>

<footer>
<p data-i18n="footer_text">Die NaturalBornChillaz Unitycard ist ein privates Kunst- und Spaßprojekt. Spenden freiwillig, ohne Gegenleistung.</p>
<div style="margin-top:15px">
<a href="impressumUnity.html" data-i18n="link_impressum">Impressum</a>
<a href="datenschutzUnity.html" data-i18n="link_privacy">Datenschutz</a>
<a href="#" onclick="showAdmin();return false" data-i18n="link_admin">Admin</a>
</div>
</footer>
</div>

<div class="we-are-chillaz" id="popup">WE ARE CHILLAZ</div>

<!-- ADMIN LOGIN MODAL -->
<div id="adminModal" class="modal-overlay">
  <div class="modal-box">
    <h2 data-i18n="admin_login_title">Admin Login</h2>
    <div class="form-group">
      <label data-i18n="admin_pass_label">Admin Passwort</label>
      <input type="password" id="adminPassInput" placeholder="••••••••">
      <div class="modal-error" id="adminError"></div>
    </div>
    <div style="display:flex;gap:15px;margin-top:25px">
      <button class="btn" onclick="checkAdminPass()" data-i18n="btn_enter">Enter</button>
      <button class="btn btn-secondary" onclick="closeAdminModal()" data-i18n="btn_cancel">Abbrechen</button>
    </div>
  </div>
</div>

<!-- EMAIL POPUP -->
<div id="mailPopup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;background:rgba(10,10,15,0.95);border:2px solid #D4AF37;border-radius:15px;padding:25px;z-index:2000">
<h2 style="margin-bottom:15px;font-family:'Orbitron';color:#D4AF37" data-i18n="mail_title">Email versenden</h2>
<label style="font-size:12px;color:#00D9FF" data-i18n="mail_subject">Betreff:</label>

<textarea id="mailBody" rows="8" style="width:100%;padding:10px;margin:8px 0"></textarea>
<div style="font-size:11px;opacity:0.6;margin:5px 0" id="mailRecipients"></div>
<div style="display:flex;gap:10px;margin-top:15px">
<button class="btn" onclick="sendAdminMail()" data-i18n="btn_send">Senden</button>
<button class="btn btn-secondary" onclick="closeMailPopup()" data-i18n="btn_cancel">Abbrechen</button>
</div>
</div>

const flagUrls = {
  de: 'https://flagcdn.com/w40/de.png',
  nl: 'https://flagcdn.com/w40/nl.png',
  en: 'https://flagcdn.com/w40/gb.png',
  fr: 'https://flagcdn.com/w40/fr.png',
  es: 'https://flagcdn.com/w40/es.png',
  bg: 'https://flagcdn.com/w40/bg.png',
  pl: 'https://flagcdn.com/w40/pl.png'
};

function getLang() {
  return localStorage.getItem('nbc_lang') || 'de';
}

function setLang(lang) {
  localStorage.setItem('nbc_lang', lang);
  document.documentElement.lang = lang;
  applyTranslations(lang);
  document.getElementById('langCurrent').style.backgroundImage = `url('${flagUrls[lang]}')`;
  document.getElementById('langMenu').style.display = 'none';
  updateDateTime();
}

function applyTranslations(lang) {
  const t = translations[lang] || translations['de'];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key]) el.placeholder = t[key];
  });
}

function toggleLangMenu() {
  const menu = document.getElementById('langMenu');
  menu.style.display = menu.style.display === 'none'? 'block' : 'none';
}

document.addEventListener('click', (e) => {
  if(!e.target.closest('#langSwitcher')) {
    document.getElementById('langMenu').style.display = 'none';
  }
});

// ===== DATUM + UHRZEIT =====
const locales = {
  de: 'de-DE',
  nl: 'nl-NL',
  en: 'en-GB',
  fr: 'fr-FR',
  es: 'es-ES',
  bg: 'bg-BG',
  pl: 'pl-PL'
};

function updateDateTime(){
  const lang = getLang();
  const locale = locales[lang] || 'de-DE';
  const now = new Date();

  const timeOptions = {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false};
  const dateOptions = {weekday:'short',year:'numeric',month:'2-digit',day:'2-digit'};

  document.getElementById('time').textContent = now.toLocaleTimeString(locale, timeOptions);
  document.getElementById('date').textContent = now.toLocaleDateString(locale, dateOptions);
}

setInterval(updateDateTime, 1000);
updateDateTime();

// ===== CORE APP =====
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
let currentUser=JSON.parse(localStorage.getItem('nbc_current')||'null');

function showTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById('registerTab').style.display='none';
document.getElementById('loginTab').style.display='none';
if(tab==='register'){document.querySelectorAll('.tab')[0].classList.add('active');document.getElementById('registerTab').style.display='block';}
else{document.querySelectorAll('.tab')[1].classList.add('active');document.getElementById('loginTab').style.display='block';}
}

document.getElementById('registerForm').onsubmit=(e)=>{
e.preventDefault();
const user={name:regName.value,email:regEmail.value,pass:regPass.value,insta:regInsta.value,nation:regNation.value,donation:0};
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
users.push(user);
localStorage.setItem('nbc_users',JSON.stringify(users));
localStorage.setItem('nbc_current',JSON.stringify(user));
window.location.href='mailto:infotonbc@gmail.com?subject=Unitycard Member&body='+encodeURIComponent(JSON.stringify(user));
document.getElementById('popup').classList.add('active');
setTimeout(()=>location.href='unitycardclub.html',2000);
};

document.getElementById('loginForm').onsubmit=(e)=>{
e.preventDefault();
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
let user=users.find(u=>u.email===loginEmail.value&&u.pass===loginPass.value);
if(user){
  localStorage.setItem('nbc_current',JSON.stringify(user));
  location.href='unitycardclub.html';
}
else alert('Chillaz, falsche Daten. Hast du schon dein Gehirn gegossen? 🧠💨');
};

function instaLogin(){
let handle=prompt('Instagram Handle:');
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
let user=users.find(u=>u.insta===handle);
if(user){
  localStorage.setItem('nbc_current',JSON.stringify(user));
  location.href='unitycardclub.html';
}
else alert('Noch nicht registriert, Chillaz!');
}

function showAdmin(){
  document.getElementById('adminModal').classList.add('active');
  document.getElementById('adminPassInput').value = '';
  document.getElementById('adminError').textContent = '';
  setTimeout(()=>document.getElementById('adminPassInput').focus(),100);
}

function closeAdminModal(){
  document.getElementById('adminModal').classList.remove('active');
}

function checkAdminPass(){
  const pw = document.getElementById('adminPassInput').value;
  if(pw === 'Slawo%123'){
    closeAdminModal();
    document.getElementById('adminPanel').style.display='block';
    loadAdminUsers();
    document.getElementById('adminPanel').scrollIntoView({behavior:'smooth'});
  } else {
    document.getElementById('adminError').textContent = 'Falsches Passwort!';
    document.getElementById('adminPassInput').value = '';
    document.getElementById('adminPassInput').focus();
  }
}

document.getElementById('adminPassInput').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') checkAdminPass();
});

document.getElementById('adminModal').addEventListener('click', (e) => {
  if(e.target.id === 'adminModal') closeAdminModal();
});

function loadAdminUsers(){
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
document.getElementById('memberTableBody').innerHTML=users.map(u=>`
<tr>
<td><input type="checkbox" class="memberCheck" data-email="${u.email}" data-name="${u.name}"></td>
<td>${u.name}</td>
<td>${u.insta}</td>
<td>${u.email}</td>
<td>${u.donation||0}€</td>
</tr>`).join('');
}

function filterMembers(){
const search = document.getElementById('memberSearch').value.toLowerCase();
document.querySelectorAll('#memberTableBody tr').forEach(row => {
  const text = row.textContent.toLowerCase();
  row.style.display = text.includes(search) ? '' : 'none';
});
}

function toggleAll(checkbox){
document.querySelectorAll('.memberCheck').forEach(cb => cb.checked = checkbox.checked);
}

function openMailPopup(){
const checked = Array.from(document.querySelectorAll('.memberCheck:checked'));
if(checked.length === 0){alert('Bitte mindestens einen Member markieren!');return;}
const emails = checked.map(cb => cb.dataset.email);
document.getElementById('mailRecipients').textContent = `Empfänger: ${emails.join(', ')}`;
document.getElementById('mailPopup').style.display='block';
}

function closeMailPopup(){
document.getElementById('mailPopup').style.display='none';
}

function sendAdminMail(){
const checked = Array.from(document.querySelectorAll('.memberCheck:checked'));
const emails = checked.map(cb => cb.dataset.email);
const subject = document.getElementById('mailSubject').value;
const body = document.getElementById('mailBody').value;
window.location.href = `mailto:infotonbc@gmail.com?bcc=${emails.join(',')}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
closeMailPopup();
}

function saveDonation(){
let users=JSON.parse(localStorage.getItem('nbc_users')||'[]');
const selected = Array.from(document.querySelectorAll('.memberCheck:checked'));
if(selected.length === 0){alert('Bitte Member auswählen!');return;}
const amount = parseInt(adminAmount.value);
if(!amount || amount < 1){alert('Bitte gültigen Betrag eingeben!');return;}
selected.forEach(cb => {
  let user = users.find(u=>u.email===cb.dataset.email);
  user.donation = (user.donation||0) + amount;
});
localStorage.setItem('nbc_users',JSON.stringify(users));
alert('Spende eingetragen! Titel wird vergeben 🌱');
loadAdminUsers();
}

// Init
setLang(getLang());
</script>
